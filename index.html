<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <title>Library</title>
</head>
<body>
    <div class="library">

    </div>
    <button class="new-btn">New book</button>
    <dialog>
        <form method="dialog" show>
            <label for="author">Author</label>
            <input type="text" name="author" id="author">

            <label for="title">Title</label>
            <input type="text" name="title" id="title">

            <label for="isRead">Have you read it?</label>
            <input type="checkbox" name="isRead" id="isRead">

            <menu>
                <li><button type="button" class="add-btn">Add book</button></li>
                <li><button type="button" class="cancel-btn">Cancel</button></li>
            </menu>
        </form>
    </dialog>
</body>
</html>
